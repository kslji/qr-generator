version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: qr_barcode
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      BASE_URL: http://localhost:3000
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: qr_barcode
      PGUSER: postgres
      PGPASSWORD: postgres
      MAX_FILE_SIZE_MB: 10
    ports:
      - "3000:3000"
    command: sh -c "node scripts/migrate.js && node src/server.js"

volumes:
  pgdata:
